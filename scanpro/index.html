<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScanPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { display: ['Inter', 'sans-serif'] },
          colors: {
            indigo: {
              500: '#6366f1',
              600: '#4f46e5',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 28px; height: 28px;
      background: white; border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: ew-resize;
    }
    input[type=range]::-moz-range-thumb {
      width: 28px; height: 28px;
      background: white; border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: ew-resize; border: none;
    }
    @keyframes scanSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.3s ease-out forwards; }
    .scan-bar { animation: scanSlide 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-[#0a0a0f] font-display antialiased text-white selection:bg-indigo-500/30">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
